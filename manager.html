<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Allows you to connect to our product.">
    <title>BM Volumetric System</title>
    <link rel="icon" type="image/png" href="BM_MiniLogo.png">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: white;
            overflow: auto;
            min-width: none;
            min-height: 20px;

            margin: 0;
            height: 100vh;
            width: 100vw;
        }

        .menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 95vh;
            position: relative;
        }

       .logo {
            position: absolute;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border: none;
            top: 2vh;
            left: 2vw;
            z-index: 10;
            transition: 0.3s;
       }

       .logo img{
            width: 15vw;
            object-fit: contain;
       }

       .logo:hover {
            transform: scale(1.05);
        }

       .login {
            position: absolute;
            display: flex;
            justify-content: center;
            align-items: center;
            top: 2vh;
            right: 2vw;
            background-color: white;
            border:  0.2vh solid black;
            z-index: 10;
            transition: 0.3s;
       }

       .login img {
            width: 6vw;
            object-fit: contain;
            cursor: pointer;
        }

        .login img:hover {
            transform: scale(1.05);
        }

        .user-panel {
            display: none; 
            position: absolute; 
            right: 110%; 
            margin-right: 0.5vw;
            background-color: lightblue; 
            border: 0.2vh solid black; 
            padding: 1.8vh;
            min-width: 9vw;
            max-width: 14vw; 
            height: auto;
            z-index: 10;
            font-size: 1vw;
        }

        .type1 {background-color: turquoise; border: 0.2vh solid black;}
        .type2 {background-color: springgreen; border: 0.2vh solid black;}
        .type3 {background-color: turquoise; border: 1px solid black; width: 1520px; height: 50px;}

        .title-container{
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            margin-bottom: 8vh;
        }

        .menu-title {
            font-size: 5vw;
            font-weight: semi-bold;
            color: black;
        }

        .menu-grid-container {
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            margin-bottom: 8vh;
        }

        .menu-grid {
            display: grid;
            justify-content: center;
            grid-template-columns: repeat(3, 1fr);
            row-gap: 3vh;
            column-gap: 5vw;
            width: 85vw;
        }

        .menu-grid button {
            width: 100%;
            aspect-ratio: 16/9;
            transition: 0.3s;

            cursor: pointer;
        }

        .menu-grid button:hover {
            transform: scale(1.05);
        }

        .menu-grid img {
            width: 60%;
        }

        .camera-img {
            width: 55vw;
            height: auto;
            object-fit: contain;
            margin-top: -8vh;
        }

        .warning {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2vw;
            margin-top: -8vh;
        }

        .boxInfo-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            margin-top: 10vh;
        }

        .boxInfo-column {
            display: flex;
            flex-direction: column;
            min-height: 5.2vw;
        }

        .boxInfo {
            font-size:1.6vw;
            text-align: left;
            width: 10vw;
        }

        .under-text {
            margin-top: 2vh;
        }

        .volumeButton {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5vh auto 0 auto;
            width:20vw;
            font-size:1.2vw;
            border: 0.2vh solid black;
        }
        
        .volumeButton:hover {
            transform: scale(1.05);
        }

        #volume-depthimg {
            position: absolute;
            left: 25vw;
            top: 37vh;
            transform: translate(-50%, -50%);
            width: 24vw;
            object-fit: contain;
        } 

        #volume-colorToDepthimg {
            position: absolute;
            left: 25vw;
            top: 77vh;
            transform: translate(-50%, -50%);
            width: 24vw;
            object-fit: contain;
        }

        #object-img{
            position: absolute;
            left: 78vw;
            top: 57vh;
            transform: translate(-50%, -50%);
            width: 33vw; 
            object-fit: contain;
        }

        #calibration-colorToDepthimg {
            position: absolute;
            left: 25vw;
            top: 37vh;
            transform: translate(-50%, -50%);
            width: 24vw;
            object-fit: contain;
        } 

        #calibration-mask {
            position: absolute;
            left: 25vw;
            top: 77vh;
            transform: translate(-50%, -50%);
            width: 24vw;
            object-fit: contain;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 3vw;
            height: 3.6vh;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-row {
            display: flex;
            align-items: center;
            gap: 0.5vw;
            font-size: 1vw;
            margin-bottom: 2vh;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 2.6vh;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 2.6vh; width: 1.2vw;
            left: 0.25vw; bottom: 0.4vh;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: turquoise;
        }

        input:checked + .slider:before {
            transform: translateX(1.2vw);
        }

        .input-box {
            display: flex;
            align-items: center;
            gap: 1vw;
            font-size: 1vw;
            margin-bottom: 2vh;
            width: fit-content;
        }

        .input-box label{
            display: inline-block;
            width: 7vw;
            text-align: left;
        }

        .input-box input {
            font-size: 1vw;
            padding: 0.3vh 0.5vw;
            border: 0.2vh solid black;
        }

        .input-box button {
            font-size: 1vw;
            padding: 0.3vh 0.5vw;
            cursor: pointer;
            border: 0.2vh solid black;
        }

        .calibButton button {
            position: absolute;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            top: 20vh;
            left: 10vw;
            color: white;
            font-size: 1vw;
            padding: 0.5vh 1vw;
            width: 80vw;
            height: 5vh;
            border: 0.2vh solid black;
        }

        .startCalibrationButton {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5vh auto 0 auto;
            width:20vw;
            font-size:1.2vw;
            border: 0.2vh solid black;
            position: absolute;
            left:47vw;
            top:73vh;
        }
        
        .startCalibrationButton:hover {
            transform: scale(1.05);
        }
        
        .calibrateButton {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5vh auto 0 auto;
            width:20vw;
            font-size:1.2vw;
            border: 0.2vh solid black;
            position: absolute;
            left:47vw;
            top:78vh;
        }
        
        .calibrateButton:hover {
            transform: scale(1.05);
        }

        

        .readonly-slider {
            display: flex;
            align-items: center;
            pointer-events: none; 
        }

        input[type="range"] {
            appearance: none;  
            width: 26vw;
        }

        /* Track - a barra por baixo */
        input[type="range"]::-webkit-slider-runnable-track {
            height: 1.9vh;          /* grossura da barra */
            background: #ccc;      /* cor da barra */
            border-radius: 0.5vw;
        }

        /* Thumb - a bolinha que mexe */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 3.2vh;           /* altura da bolinha */
            width: 1.6vw;            /* largura da bolinha */
            background: #ccc;
            border: 0.2vh solid #9d9d9d;
            border-radius: 50%;
            margin-top: -0.6vh;      /* para centralizar a bolinha na barra */
        }

    </style>
</head>

        function showLoginScreen() {
            document.getElementById("register-screen").style.display = "none";
            document.getElementById("login-screen").style.display = "flex";
            document.getElementById("reg-error-label").textContent = "";
            document.getElementById("reg-username").value = "";
            document.getElementById("reg-password").value = "";
            document.getElementById("reg-role").value = "user";
            document.getElementById("reg-code").value = "";
        }

        window.addEventListener("DOMContentLoaded", () => {
            const savedUser = JSON.parse(localStorage.getItem("current_user"));
            if(savedUser) {
                document.getElementById("login-screen").style.display = "none";
                currentMenu = "main-menu";
                document.getElementById(currentMenu).style.display = "block";
            }
        });

        async function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorLabel = document.getElementById("error-label");

            if (!user || !pass) {
                errorLabel.textContent = "Please fill in all fields.";
                return;
            }

            try{
                const response = await fetch('http://10.0.30.175:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    const role = data.role;

                    localStorage.setItem("current_user", JSON.stringify({ username: user, role: role }));

                    document.getElementById("login-screen").style.display = "none";
                    currentMenu = "main-menu";
                    document.getElementById(currentMenu).style.display = "block";
                } else {
                    const data = await response.json();
                    errorLabel.textContent =  data.detail;
                }
            } catch (error) {
                errorLabel.textContent = "Server connection error.";
            }
        }

        function showRegisterScreen() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("register-screen").style.display = "flex";
            document.getElementById("error-label").textContent = "";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        async function register() {
            const user = document.getElementById("reg-username").value;
            const pass = document.getElementById("reg-password").value;
            const role = document.getElementById("reg-role").value;
            const code = document.getElementById("reg-code").value;
            const errorLabel = document.getElementById("reg-error-label");

            if (!user || !pass || (role === "admin" && !code)) {
                errorLabel.textContent = "Please fill in all fields.";
                return;
            }

            try {
                const response = await fetch('http://10.0.30.175:8000/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: user, password: pass, role: role, code: code })
                });
                
                const data = await response.json();

                if (!response.ok) {
                   errorLabel.textContent = data.detail || "Registration failed.";
                    return;
                }

            } catch (error) {
                errorLabel.textContent = "Server connection error.";
                return;
            }

            errorLabel.textContent = "Registration successful!";
            showLoginScreen();
        }

        function handleRoleChange() {
            const role = document.getElementById("reg-role");
            const code = document.getElementById("reg-code");

            if (role.value === "admin") {
                code.disabled = false;
            } else {
                code.disabled = true;
                code.value = "";
            }
        }

        function UserInfo(button) {
            const panel = button.querySelector(".user-panel");
            const currentUser = JSON.parse(localStorage.getItem("current_user"));

            if (!currentUser) return;

            panel.querySelector("#user-name").textContent = "User: " + currentUser.username;
            panel.querySelector("#user-role").textContent = "Role: " + currentUser.role;

            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        }

        document.addEventListener("click", function(event) {
            const clickedLoginButton = event.target.closest(".login");
            
            // fecha todos os painéis que estão abertos, exceto o do login clicado
            document.querySelectorAll(".login .user-panel").forEach(panel => {
                if (panel.style.display === "block" && (!clickedLoginButton || !clickedLoginButton.contains(panel))) {
                    panel.style.display = "none";
                }
            });
        });

        function logout() {
            localStorage.removeItem("current_user");

        function goTo(menuID) {
            if(currentMenu) {
                menuStack.push(currentMenu);

            document.getElementById(menuID).style.display = "block";    
            currentMenu = menuID; 

            if (menuID === "camera-menu") {

        async function exposureSet_click() {
            const value = parseInt(document.getElementById("exposureTime").value);
            
            if (isNaN(value)) {
                document.getElementById("config-error").textContent = "Only integer values are allowed for exposure time.";
                return;
            }

            if (value < 100 || value > 4000) {
                document.getElementById("config-error").textContent = "Exposure Time value must be between 100 and 4000.";
                return;
            }

            try {
                await fetch("http://10.0.30.175:8000/camera/setExposureTime", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ exposureTime: value })
                });
            } catch (error) {
                console.error("Exposure set error:", error);
            }
        }

        async function colorSlopeSet_click() {
            const value = parseInt(document.getElementById("colorSlope").value);
            if (isNaN(value)) {
                document.getElementById("config-error").textContent = "Only integer values are allowed for color slope.";
                return;
            }

            if (value < 150 || value > 5000) {
                document.getElementById("config-error").textContent = "Color Slope value must be between 150 and 5000.";
                return;
            }

            try {
                await fetch("http://10.0.30.175:8000/camera/setColorSlope", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ colorSlope: value })
                });
            } catch (error) {
                console.error("Color slope set error:", error);
            }
        }

            try {
                if(currentMenu === "config-menu") {
                    // MODE (Static / Dynamic)
                    let r = await fetch("http://10.0.30.175:8000/mode");
                    let modeData = await r.json();

                    document.getElementById("StaticDynamic_switch").checked =
                        (modeData["Mode"] === "Dynamic");

                    // EXPOSITION MODE
                    r = await fetch("http://10.0.30.175:8000/expositionMode");
                    let expData = await r.json();

                    document.getElementById("ExpHDR_switch").checked =
                        (expData["Exposition Mode"] === "HDR");

                    // DEBUG MODE
                    r = await fetch("http://10.0.30.175:8000/debugMode");
                    let debugData = await r.json();

                    document.getElementById("DebugMode_switch").checked =
                        (debugData["Debug Mode"] === "On");
                } else if (currentMenu === "calibration-menu") {
                    // CALIBRATION MODE
                    r = await fetch("http://10.0.30.175:8000/calibrate/mode");
                    let calibData = await r.json();

                    document.getElementById("AutoManual_switch").checked =
                        (calibData["Calibrate Mode"] === "Manual");
                }
            } catch (error) {
                console.log("Toggle refresh error:", error);
            }

            // só continua a atualizar se estiveres no config menu
            if (currentMenu === "config-menu" || currentMenu === "calibration-menu") {
                setTimeout(refreshToggles, 500);
            }
        }

        async function refreshSliders() {
            try {
                const resp = await fetch("http://10.0.30.175:8000/mask", { method: 'GET' });
                const data = await resp.json();

                document.getElementById("hminSlider").value = data.hmin;
                document.getElementById("hminValue").textContent = data.hmin;

                document.getElementById("hmaxSlider").value = data.hmax;
                document.getElementById("hmaxValue").textContent = data.hmax;

                document.getElementById("sminSlider").value = data.smin;
                document.getElementById("sminValue").textContent = data.smin;

                document.getElementById("smaxSlider").value = data.smax;
                document.getElementById("smaxValue").textContent = data.smax;

                document.getElementById("vminSlider").value = data.vmin;
                document.getElementById("vminValue").textContent = data.vmin;

                document.getElementById("vmaxSlider").value = data.vmax;
                document.getElementById("vmaxValue").textContent = data.vmax;

            } catch (err) {
                console.warn("Não foi possível atualizar sliders:", err);
            }

            if (currentMenu === "calibration-menu") {
                setTimeout(refreshSliders, 500);
            }
        }

        async function applyMask() {
            try {
                if (currentMenu !== "calibration-menu") return;
                const r = await fetch("http://10.0.30.175:8000/mask");
                const maskValues = await r.json();
                await fetch("http://10.0.30.175:8000/applyMask", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(maskValues)
                });
            } catch (err) { console.warn("Erro applyMask:", err); }
        }

        async function applyManualWSDraw() {
            try {
                if (selected_point === null) {
                    const r = await fetch("http://10.0.30.175:8000/calibrate/params");
                    detection_area = (await r.json())["Detection Area"];
                }
                await fetch("http://10.0.30.175:8000/applyManualWorkspace", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ detection_area })
                });
            } catch (err) { console.warn("Erro applyManualWSDraw:", err); }
        }

        async function workspaceDrawing(){
            try{
                r = await fetch("http://10.0.30.175:8000/calibrate/mode");
                let calibData = await r.json();
                if (calibData["Calibrate Mode"] === "Automatic") {
                    applyMask();
                } else if (calibData["Calibrate Mode"] === "Manual") {
                    applyManualWSDraw();
                }
            } catch (err) { console.warn("Erro drawing Workspace:", err); }
            
            if (currentMenu === "calibration-menu") {
                setTimeout(workspaceDrawing, 500);
            }
        }

        async function colorDropdown_change() {
            try {
                const color = document.getElementById("colorDropdown").value;
                await fetch("http://10.0.30.175:8000/mask/color", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ color })
                });
                await fetch("http://10.0.30.175:8000/mask/optionSelected", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ optionSelected: color })
                });
            } catch (err) { console.warn("Erro a mudar cor:", err); }
        }

        function setColorDropdownState(calibrationMode) {
            const dropdown = document.getElementById("colorDropdown");
            dropdown.disabled = calibrationMode;
        }

        async function screenClick() {
            if (colorClickInitialized) return;

            const img = document.getElementById("calibration-colorToDepthimg");
            img.addEventListener("click", async (event) => {

                try {
                    if (currentMenu === "calibration-menu"){
                        const r = await fetch("http://10.0.30.175:8000/calibrate/mode");
                        let calibData = await r.json();

                        if (calibData["Calibrate Mode"] === "Automatic") {
                            const r = await fetch("http://10.0.30.175:8000/mask");
                            const maskValues = await r.json();
                            let optionSelected = maskValues.optionSelected;

                            if (optionSelected === "Select a Point") {
                                const rect = img.getBoundingClientRect();
                                const x = Math.round((event.clientX - rect.left) * (img.naturalWidth / rect.width));
                                const y = Math.round((event.clientY - rect.top) * (img.naturalHeight / rect.height));

                                await fetch("http://10.0.30.175:8000/mask/colorClick", {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({x, y})
                                });
                            }
                        } else if (calibData["Calibrate Mode"] === "Manual") {
                            const r = await fetch("http://10.0.30.175:8000/calibrate/params");
                            const response = await r.json();
                            let points = response["Detection Area"];

                            const rect = img.getBoundingClientRect();
                            const x = (event.clientX - rect.left) * (img.naturalWidth / rect.width);
                            const y = (event.clientY - rect.top) * (img.naturalHeight / rect.height);

                            let minDist = Infinity;
                            let closestPoint = null;

                            {/*if (x1 - thresh <= x && x <= x1 + thresh && y1 - thresh <= y && y <= y2 + thresh) {
                                selected_bar = "left";
                            } else if (x2 - thresh <= x && x <= x2 + thresh && y1 - thresh <= y && y <= y2 + thresh) {
                                selected_bar = "right";
                            } else if (y1 - thresh <= y && y <= y1 + thresh && x1 - thresh <= x && x <= x2 + thresh) {
                                selected_bar = "top";
                            } else if (y2 - thresh <= y && y <= y2 + thresh && x1 - thresh <= x && x <= x2 + thresh) {
                                selected_bar = "bottom";
                            } else {
                                selected_bar = null;
                            }*/}

                            points.forEach((point, index) => {
                                const dist = Math.sqrt((point[0] - x) ** 2 + (point[1] - y) **2);
                                if (dist < minDist){
                                    minDist = dist;
                                    closestPoint = index;
                                }
                            });

                            if (minDist <= 10){
                                selected_point = closestPoint;
                                console.log("Selected point:", selected_point);
                            } else {
                                selected_point = null;
                                console.log("None of the points were selected")
                            }
                        }
                    }
                } catch (err) { console.warn("Erro colorClick:", err); }
            });
                    
            colorClickInitialized = true;
        }

        document.addEventListener("keydown", async (event) => {
            try {
                 if (currentMenu === "calibration-menu") {
                    const r_mode = await fetch("http://10.0.30.175:8000/calibrate/mode");
                    const calibData = await r_mode.json();

                    if (calibData["Calibrate Mode"] !== "Manual") return;

                    // Pegar detection_area do servidor
                    const r = await fetch("http://10.0.30.175:8000/calibrate/params");
                    let data = await r.json();
                    detection_area = data["Detection Area"]; // [x1, y1, x2, y2]

                    const img = document.getElementById("calibration-colorToDepthimg");
                    const maxX = img.naturalWidth;
                    const maxY = img.naturalHeight;

                    let point = detection_area[selected_point];

                    if (event.key === "ArrowLeft") {
                        //if (selected_bar === "left") x1 = Math.max(0, x1 - step);
                        //else if (selected_bar === "right") x2 = Math.max(0, x2 - step);
                        point[0] = Math.max(0, point[0] - step);

                    } else if (event.key === "ArrowRight") {
                        //if (selected_bar === "left") x1 = Math.min(maxX, x1 + step);
                        //else if (selected_bar === "right") x2 = Math.min(maxX, x2 + step);
                        point[0] = Math.min(maxX, point[0] + step);

                    } else if (event.key === "ArrowUp") {
                        //if (selected_bar === "top") y1 = Math.max(0, y1 - step);
                        //else if (selected_bar === "bottom") y2 = Math.max(0, y2 - step);
                        point[1] = Math.max(0, point[1] - step);

                    } else if (event.key === "ArrowDown") {
                        //if (selected_bar === "top") y1 = Math.min(maxY, y1 + step);
                        //else if (selected_bar === "bottom") y2 = Math.min(maxY, y2 + step);
                        point[1] = Math.min(maxY, point[1] + step);

                    }

                    detection_area[selected_point] = point;
                }
            } catch (err) {
                console.warn("Erro key_pressed:", err);
            }
        });

        async function startCalibration_click() {
            try{
                r = await fetch("http://10.0.30.175:8000/calibrate/mode");
                let calibData = await r.json();
                if (calibData["Calibrate Mode"] === "Automatic") {
                    applyMask();
                } else if (calibData["Calibrate Mode"] === "Manual") {
                    applyManualWSDraw();
                }
                // Color frame
                const colorResp = await fetch("http://10.0.30.175:8000/getFrame/colorToDepthCopy");
                const colorToDepthBlob = await colorResp.blob();
                document.getElementById("calibration-colorToDepthimg").src = URL.createObjectURL(colorToDepthBlob);

                // Mask frame
                const maskResp = await fetch("http://10.0.30.175:8000/getFrame/result");
                const maskBlob = await maskResp.blob();
                document.getElementById("calibration-mask").src = URL.createObjectURL(maskBlob);
            }
            catch (error) {
                console.error(error);
            }
        }

        async function calibrate_click() {
            const calibrateLabel = document.getElementById("calibrateLabel");
            const caliErrorLabel = document.getElementById("caliErrorLabel");

            const TextCalibrated = "System Calibrated";
            const TextNotCalibrated = "System was not Calibrated";
            const TextError = "Error";
            const TextWsNotEmpty = "Workspace isn't Empty";
            const TextCenterNotAligned = "Center Point isn't Aligned";
            const TextWsNotEmptyAndCenterNotAligned = "Center Point isn't Aligned and Workspace isn't Empty";
            const TextClear = "";

            try {
                const maskResponse = await fetch("http://10.0.30.175:8000/mask");
                if (!maskResponse.ok) throw new Error("Mask request failed");
                const maskValues = await maskResponse.json();

                const calibrateResponse = await fetch("http://10.0.30.175:8000/calibrate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(maskValues)
                });

                if (!calibrateResponse.ok) throw new Error("Calibrate request failed");

                const flagsResponse = await fetch("http://10.0.30.175:8000/calibrate/flags");
                if (!flagsResponse.ok) throw new Error("Flags request failed");

                const data = await flagsResponse.json();

                const center_aligned = data["Center Aligned"];
                const ws_clear = data["Workspace Clear"];

                if (center_aligned && ws_clear) {
                    calibrateLabel.innerText = TextCalibrated;
                    caliErrorLabel.innerText = TextClear;
                }
                else if (center_aligned && !ws_clear) {
                    calibrateLabel.innerText = TextNotCalibrated;
                    caliErrorLabel.innerText = TextWsNotEmpty;
                }
                else if (!center_aligned && ws_clear) {
                    calibrateLabel.innerText = TextNotCalibrated;
                    caliErrorLabel.innerText = TextCenterNotAligned;
                }
                else {
                    calibrateLabel.innerText = TextNotCalibrated;
                    caliErrorLabel.innerText = TextWsNotEmptyAndCenterNotAligned;
                }

            } catch (error) {
                calibrateLabel.innerText = TextError;
                caliErrorLabel.innerText = TextError;
                console.error(error);
            }
        }

    </script>
