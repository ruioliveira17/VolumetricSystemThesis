<!DOCTYPE html>
<html>
<head>
    <title>BM Volumetric System</title>
    <link rel="icon" type="image/png" href="BM_MiniLogo.png">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: white;
        }

       .logo {
            width: 280px;
            position: absolute;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: white;
            border: none;
       }

       .logo img{
            width: 280px;
            object-fit: contain;
       }

       .login {
            position: absolute;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            background-color: white;
            border: none;
       }

       .login img {
            width: 150px;
            height: 150px;
            object-fit: contain;
        }

        .buttons button {
            position: absolute;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .buttons img {
            width: 350px;
            height: 350px;
            object-fit: contain;
        }

        .type1 {background-color: turquoise; border: 1px solid black; width: 400px; height: 300px;}
        .type2 {background-color: springgreen; border: 1px solid black; width: 400px; height: 300px;}
        .type3 {background-color: turquoise; border: 1px solid black; width: 1520px; height: 50px;}

        .menu-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);

            position: absolute;
            font-size: 90px;
            font-weight: semi-bold;
            color: black;
            text-align: center;
        }

        #depth-img {
            position: absolute;
            left: 480px;
            top: 400px;
            transform: translate(-50%, -50%);
            width: 560px;
            height: 420px;
            object-fit: contain;
        } 

        #colorToDepth-img {
            position: absolute;
            left: 480px;
            top: 830px;
            transform: translate(-50%, -50%);
            width: 560px;
            height: 420px;
            object-fit: contain;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: turquoise;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .readonly-slider {
            display: flex;
            align-items: center;
            pointer-events: none; 
        }

        input[type="range"] {
            appearance: none;  
            width: 500px;
        }

        /* Track - a barra por baixo */
        input[type="range"]::-webkit-slider-runnable-track {
            height: 20px;          /* grossura da barra */
            background: #ccc;      /* cor da barra */
            border-radius: 10px;
        }

        /* Thumb - a bolinha que mexe */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 30px;           /* altura da bolinha */
            width: 30px;            /* largura da bolinha */
            background: #ccc;
            border: 1px solid #9d9d9d;
            border-radius: 50%;
            margin-top: -5px;      /* para centralizar a bolinha na barra */
        }

    </style>
</head>

    <script>
        let menuStack = [];
        let currentMenu = null;
        let cameraLoopInterval = null;
        let colorClickInitialized = false;
        let selected_bar = null;
        let step = 1;
        let thresh = 10;
        let detection_area = [0, 0, 0, 0];

        function showLoginScreen() {
            document.getElementById("register-screen").style.display = "none";
            document.getElementById("login-screen").style.display = "block";
            document.getElementById("reg-error-label").textContent = "";
            document.getElementById("reg-username").value = "";
            document.getElementById("reg-password").value = "";
            document.getElementById("reg-role").value = "user";
            document.getElementById("reg-code").value = "";
        }

        window.addEventListener("DOMContentLoaded", () => {
            const savedUser = JSON.parse(localStorage.getItem("current_user"));
            if(savedUser) {
                document.getElementById("login-screen").style.display = "none";
                currentMenu = "main-menu";
                document.getElementById(currentMenu).style.display = "block";
            }
        });

        async function login() {
            const user = document.getElementById("username").value;
            const pass = document.getElementById("password").value;
            const errorLabel = document.getElementById("error-label");

            if (!user || !pass) {
                errorLabel.textContent = "Please fill in all fields.";
                return;
            }

            try{
                const response = await fetch('http://10.0.30.211:8000/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: user, password: pass })
                });

                if (response.ok) {
                    const data = await response.json();
                    const role = data.role;

                    localStorage.setItem("current_user", JSON.stringify({ username: user, role: role }));

                    document.getElementById("login-screen").style.display = "none";
                    currentMenu = "main-menu";
                    document.getElementById(currentMenu).style.display = "block";
                } else {
                    const data = await response.json();
                    errorLabel.textContent =  data.detail;
                }
            } catch (error) {
                errorLabel.textContent = "Server connection error.";
            }
        }

        function showRegisterScreen() {
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("register-screen").style.display = "block";
            document.getElementById("error-label").textContent = "";
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        async function register() {
            const user = document.getElementById("reg-username").value;
            const pass = document.getElementById("reg-password").value;
            const role = document.getElementById("reg-role").value;
            const code = document.getElementById("reg-code").value;
            const errorLabel = document.getElementById("reg-error-label");

            if (!user || !pass || (role === "admin" && !code)) {
                errorLabel.textContent = "Please fill in all fields.";
                return;
            }

            try {
                const response = await fetch('http://10.0.30.211:8000/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: user, password: pass, role: role, code: code })
                });
                
                const data = await response.json();

                if (!response.ok) {
                   errorLabel.textContent = data.detail || "Registration failed.";
                    return;
                }

            } catch (error) {
                errorLabel.textContent = "Server connection error.";
                return;
            }

            errorLabel.textContent = "Registration successful!";
            showLoginScreen();
        }

        function handleRoleChange() {
            const role = document.getElementById("reg-role");
            const code = document.getElementById("reg-code");

            if (role.value === "admin") {
                code.disabled = false;
            } else {
                code.disabled = true;
                code.value = "";
            }
        }

        function UserInfo() {
            const panel = document.getElementById("user-panel");
            const currentUser = JSON.parse(localStorage.getItem("current_user"));

            if (!currentUser) return;

            document.getElementById("user-name").textContent = "User: " + currentUser.username;
            document.getElementById("user-role").textContent = "Role: " + currentUser.role;

            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        }

        document.addEventListener("click", function(event) {
            const panel = document.getElementById("user-panel");
            const clickedInsidePanel = panel.contains(event.target);
            const clickedLoginButton = event.target.closest(".login");

            if (panel.style.display === "block" && 
                !clickedInsidePanel && 
                !clickedLoginButton) {
                panel.style.display = "none";
            }
        });

        function logout() {
            localStorage.removeItem("current_user");
            cameraLoopInterval = null;
            document.getElementById(currentMenu).style.display = "none";
            document.getElementById("user-panel").style.display = "none";
            
            document.getElementById("login-screen").style.display = "block";

            document.getElementById("username").value = "";
            document.getElementById("password").value = "";

            menuStack = [];
            currentMenu = null;
        }

        function goTo(menuID) {
            if(currentMenu) {
                menuStack.push(currentMenu);
                document.getElementById(currentMenu).style.display = "none";
            }
            document.getElementById(menuID).style.display = "block";    
            currentMenu = menuID; 

            if (menuID === "camera-menu" || menuID === "volume-menu" || menuID === "calibration-menu") {
                updateCameraFeedLoop();
            } else {
                if (cameraLoopInterval){
                    clearInterval(cameraLoopInterval);
                    cameraLoopInterval = null;
                } 
            }

            if (menuID === "config-menu" || menuID === "calibration-menu") {
                refreshToggles();
            }
            if (menuID === "calibration-menu") {
                refreshSliders();
                screenClick();
            }
        }

        function goBack() {
            if (menuStack.length === 0) return;

            document.getElementById(currentMenu).style.display = "none";
            currentMenu = menuStack.pop();
            document.getElementById(currentMenu).style.display = "block";
        }

        async function volumeBundle_click() {
            const TextOutOfLine = "There are objects outside the yellow stripes. To detect them, make sure they are inside the stripes.";

        async function updateCameraFeed() {
            try{
                const modeResponse = await fetch('http://10.0.30.211:8000/expositionMode');
                const modeData = await modeResponse.json();

                if (modeData["Exposition Mode"] === "Fixed Exposition") {
                    await fetch('http://10.0.30.211:8000/captureFrame', { method: 'POST' });
                }

                let colorFrameUrl = 'http://10.0.30.211:8000/getFrame/color';
                let colorToDepthFrameUrl = 'http://10.0.30.211:8000/getFrame/colorToDepth';
                let depthFrameUrl = 'http://10.0.30.211:8000/getFrame/depth';
                if (modeData["Exposition Mode"] === "HDR") {
                    let resp = await fetch('http://10.0.30.211:8000/getFrame/HDRcolor');
                    if (resp.status === 204) {
                        resp = await fetch(colorFrameUrl);
                    }
                    const blob = await resp.blob();
                    document.getElementById("camera-img").src = URL.createObjectURL(blob);
                } else {
                    const resp = await fetch(colorFrameUrl);
                    const blob = await resp.blob();
                    document.getElementById("camera-img").src = URL.createObjectURL(blob);
                }

                if (modeData["Exposition Mode"] === "HDR") {
                    let resp = await fetch('http://10.0.30.211:8000/getFrame/HDRcolorToDepth');
                    if (resp.status === 204) {
                        resp = await fetch(colorToDepthFrameUrl);
                    }
                    const blob = await resp.blob();
                    document.getElementById("colorToDepth-img").src = URL.createObjectURL(blob);
                } else {
                    const resp = await fetch(colorToDepthFrameUrl);
                    const blob = await resp.blob();
                    document.getElementById("colorToDepth-img").src = URL.createObjectURL(blob);
                }

                if (modeData["Exposition Mode"] === "HDR") {
                    let resp = await fetch('http://10.0.30.211:8000/getFrame/HDRdepth');
                    if (resp.status === 204) {
                        resp = await fetch(depthFrameUrl);
                    }
                    const blob = await resp.blob();
                    document.getElementById("depth-img").src = URL.createObjectURL(blob);
                } else {
                    const resp = await fetch(depthFrameUrl);
                    const blob = await resp.blob();
                    document.getElementById("depth-img").src = URL.createObjectURL(blob);
                }

                if (currentMenu === "calibration-menu") {
                    r = await fetch("http://127.0.0.1:8000/calibrate/mode");
                    let calibData = await r.json();
                    if (calibData["Calibrate Mode"] === "Automatic") {
                        applyMask();
                    } else if (calibData["Calibrate Mode"] === "Manual") {
                        applyManualWSDraw();
                    }
                    // Color frame
                    const colorResp = await fetch("http://127.0.0.1:8000/getFrame/colorToDepthCopy");
                    const colorToDepthBlob = await colorResp.blob();
                    document.getElementById("colorToDepthCopy-img").src = URL.createObjectURL(colorToDepthBlob);

                    // Mask frame
                    const maskResp = await fetch("http://127.0.0.1:8000/getFrame/result");
                    const maskBlob = await maskResp.blob();
                    document.getElementById("mask-img").src = URL.createObjectURL(maskBlob);

                }    
            }catch (error) {
                console.error("Camera error:", error);
            }
        }

        function updateCameraFeedLoop() {
            if (cameraLoopInterval) return;

            cameraLoopInterval = setInterval(() => {
                if (currentMenu === "camera-menu" || currentMenu === "volume-menu" || currentMenu === "calibration-menu") {
                    updateCameraFeed();
                }
            }, 333);
        }

        async function exposureSet_click() {
            const value = parseInt(document.getElementById("exposureTime").value);
            
            if (isNaN(value)) {
                document.getElementById("config-error").textContent = "Only integer values are allowed for exposure time.";
                return;
            }

            if (value < 100 || value > 4000) {
                document.getElementById("config-error").textContent = "Exposure Time value must be between 100 and 4000.";
                return;
            }

            try {
                await fetch("http://127.0.0.1:8000/camera/setExposureTime", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ exposureTime: value })
                });
            } catch (error) {
                console.error("Exposure set error:", error);
            }
        }

        async function colorSlopeSet_click() {

            if (isNaN(value)) {

        async function refreshToggles() {
            try {
                if(currentMenu === "config-menu") {
                    // MODE (Static / Dynamic)
                    let r = await fetch("http://127.0.0.1:8000/mode");
                    let modeData = await r.json();

                    document.getElementById("StaticDynamic_switch").checked =
                        (modeData["Mode"] === "Dynamic");

                    // EXPOSITION MODE
                    r = await fetch("http://127.0.0.1:8000/expositionMode");
                    let expData = await r.json();

                    document.getElementById("ExpHDR_switch").checked =
                        (expData["Exposition Mode"] === "HDR");

                    // DEBUG MODE
                    r = await fetch("http://127.0.0.1:8000/debugMode");
                    let debugData = await r.json();

                    document.getElementById("DebugMode_switch").checked =
                        (debugData["Debug Mode"] === "On");
                } else if (currentMenu === "calibration-menu") {
                    // CALIBRATION MODE
                    r = await fetch("http://127.0.0.1:8000/calibrate/mode");
                    let calibData = await r.json();

                    document.getElementById("AutoManual_switch").checked =
                        (calibData["Calibrate Mode"] === "Manual");
                }
            } catch (error) {
                console.log("Toggle refresh error:", error);
            }

            // só continua a atualizar se estiveres no config menu
            if (currentMenu === "config-menu" || currentMenu === "calibration-menu") {
                setTimeout(refreshToggles, 100);
            }
        }

        async function screenClick() {
            if (colorClickInitialized) return;

            const img = document.getElementById("colorToDepthCopy-img");
            img.addEventListener("click", async (event) => {

                try {
                    const r = await fetch("http://127.0.0.1:8000/calibrate/mode");
                    let calibData = await r.json();

                    if (calibData["Calibrate Mode"] === "Automatic") {
                        const r = await fetch("http://127.0.0.1:8000/mask");
                        const maskValues = await r.json();
                        let optionSelected = maskValues.optionSelected;

                        if (optionSelected === "Select a Point") {
                            const canvas =document.createElement("canvas");
                            canvas.width = img.width;
                            canvas.height = img.height;
                            const ctx = canvas.getContext("2d");

                            ctx.drawImage(img, 0, 0, img.width, img.height);
                        
                            const rect = img.getBoundingClientRect();
                            const x = event.clientX - rect.left;
                            const y = event.clientY - rect.top;

                            const pixel = ctx.getImageData(x, y, 1, 1).data; // [r, g, b, a]

                            await fetch("http://127.0.0.1:8000/mask/colorClick", {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ r: pixel[0], g: pixel[1], b: pixel[2] })
                            });
                        }
                    } else if (calibData["Calibrate Mode"] === "Manual") {
                        const r = await fetch("http://127.0.0.1:8000/calibrate/params");
                        const response = await r.json();
                        let [x1, y1, x2, y2] = response["Detection Area"];

                        const rect = img.getBoundingClientRect();
                        const x = (event.clientX - rect.left) * (img.naturalWidth / img.width); // ajustar coordenada x para a resolução original
                        const y = (event.clientY - rect.top) * (img.naturalHeight / img.height); // ajustar coordenada y para a resolução original

                        if (x1 - thresh <= x && x <= x1 + thresh && y1 - thresh <= y && y <= y2 + thresh) {
                            selected_bar = "left";
                        } else if (x2 - thresh <= x && x <= x2 + thresh && y1 - thresh <= y && y <= y2 + thresh) {
                            selected_bar = "right";
                        } else if (y1 - thresh <= y && y <= y1 + thresh && x1 - thresh <= x && x <= x2 + thresh) {
                            selected_bar = "top";
                        } else if (y2 - thresh <= y && y <= y2 + thresh && x1 - thresh <= x && x <= x2 + thresh) {
                            selected_bar = "bottom";
                        } else {
                            selected_bar = null;
                        }

                        console.log("Selected bar:", selected_bar);
                    }
                } catch (err) { console.warn("Erro colorClick:", err); }
            });
                    
            colorClickInitialized = true;
        }

        document.addEventListener("keydown", async (event) => {
            try {
                const r_mode = await fetch("http://127.0.0.1:8000/calibrate/mode");
                const calibData = await r_mode.json();

                if (calibData["Calibrate Mode"] !== "Manual") return;

                // Pegar detection_area do servidor
                const r = await fetch("http://127.0.0.1:8000/calibrate/params");
                let data = await r.json();
                detection_area = data["Detection Area"]; // [x1, y1, x2, y2]

                const img = document.getElementById("colorToDepthCopy-img");
                const maxX = img.naturalWidth;
                const maxY = img.naturalHeight;

                let [x1, y1, x2, y2] = detection_area;

                if (event.key === "ArrowLeft") {
                    if (selected_bar === "left") x1 = Math.max(0, x1 - step);
                    else if (selected_bar === "right") x2 = Math.max(0, x2 - step);

                } else if (event.key === "ArrowRight") {
                    if (selected_bar === "left") x1 = Math.min(maxX, x1 + step);
                    else if (selected_bar === "right") x2 = Math.min(maxX, x2 + step);

                } else if (event.key === "ArrowUp") {
                    if (selected_bar === "top") y1 = Math.max(0, y1 - step);
                    else if (selected_bar === "bottom") y2 = Math.max(0, y2 - step);

                } else if (event.key === "ArrowDown") {
                    if (selected_bar === "top") y1 = Math.min(maxY, y1 + step);
                    else if (selected_bar === "bottom") y2 = Math.min(maxY, y2 + step);
                }

                detection_area = [x1, y1, x2, y2];

            } catch (err) {
                console.warn("Erro key_pressed:", err);
            }
        });
